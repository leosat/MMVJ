global:
  update_rate: 1000

my_templates:
  note_C4: &note_C4
    midi_message: { type: note, channel: any, number: 60 }
    range: [0, 127]
    description: Middle C (velocity used as value) user-defined
  note_any: &note_any
    midi_message: { type: note, channel: any }
    range: [0, 127]
    description: Any note.

midi_devices:
  default_midi:
    match_criteria:
      name_regex: "."
    metadata:
      friendly_name: "Default MIDI Device"
    controls:
      pitch_wheel: { predefined_type: pitch_wheel }
      mod_wheel: { predefined_type: mod_wheel }
      expr: { predefined_type: expression_pedal }
      any_c_note: { predefined_type: note_C }
      c4_note: { <<: *note_C4 }
      any_c#_note: { predefined_type: note_C# }
      any_d_note: { predefined_type: note_D }
      any_d#_note: { predefined_type: note_D# }
      any_e_note: { predefined_type: note_E }
      any_f_note: { predefined_type: note_F }
      any_f#_note: {  predefined_type: note_F# }
      any_g_note: { predefined_type: note_G }
      any_g#_note: { predefined_type: note_G# }
      any_a_note: { predefined_type: note_A }
      any_a#_note: { predefined_type: note_A# }
      any_b_note: { predefined_type: note_B }

  # korg_nano_midi:
